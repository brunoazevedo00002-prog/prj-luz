<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grão & Poesia — Cafeteria Literária</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Source+Sans+3:wght@400;600&family=DM+Sans:wght@500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FBF6EF;--coffee:#5C3317;--terra:#D4714A;--leaf:#4A6741;--gold:#C9A84C;
  --ff-d:'Playfair Display',serif;--ff-b:'Source Sans 3',sans-serif;--ff-l:'DM Sans',sans-serif;
}
body{font-family:var(--ff-b);background:var(--cream);color:var(--coffee)}
img{display:block}
button{cursor:pointer;font-family:inherit}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(251,246,239,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(92,51,23,.1);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--ff-d);font-style:italic;font-size:1.25rem;color:var(--coffee);background:none;border:none;padding:0}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links button{background:none;border:none;font-family:var(--ff-l);font-size:.85rem;color:var(--coffee);transition:color .2s;padding:4px 0}
.nav-links button:hover,.nav-links button.active{color:var(--terra)}

/* PAGE ANIMATION */
.page{min-height:100vh;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* BACK BAR */
.back-bar{background:var(--cream);padding:.9rem 2.5rem;border-bottom:1px solid rgba(92,51,23,.08);display:flex;align-items:center}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:var(--ff-l);font-size:.83rem;color:var(--coffee);transition:color .2s;padding:0}
.back-btn:hover{color:var(--terra)}

/* HERO */
.hero{padding:4.5rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;align-items:center;min-height:88vh}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,113,74,.12);color:var(--terra);padding:5px 13px;border-radius:18px;font-family:var(--ff-l);font-size:.75rem;margin-bottom:1.3rem}
.hero h1{font-family:var(--ff-d);font-style:italic;font-size:clamp(2.2rem,4vw,3.8rem);line-height:1.15;margin-bottom:1.3rem}
.hero p{font-size:1rem;line-height:1.85;color:rgba(92,51,23,.7);margin-bottom:2.2rem;max-width:450px}
.btn-row{display:flex;gap:.9rem;flex-wrap:wrap}
.btn-fill{background:var(--coffee);color:var(--cream);padding:12px 24px;border-radius:9px;font-family:var(--ff-l);font-size:.85rem;border:none;transition:background .2s,transform .15s}
.btn-fill:hover{background:var(--terra);transform:translateY(-2px)}
.btn-fill:active{transform:scale(.97)}
.btn-ghost{background:transparent;color:var(--coffee);padding:11px 24px;border-radius:9px;font-family:var(--ff-l);font-size:.85rem;border:1.5px solid var(--coffee);transition:color .2s,border-color .2s,transform .15s}
.btn-ghost:hover{color:var(--terra);border-color:var(--terra);transform:translateY(-2px)}
.btn-ghost:active{transform:scale(.97)}
.hero-img-wrap{position:relative}
.hero-img-bg{position:absolute;inset:-14px;background:rgba(212,113,74,.15);border-radius:26px;transform:rotate(3deg)}
.hero-img-wrap img{width:100%;border-radius:20px;position:relative;object-fit:cover;height:480px;box-shadow:0 20px 60px rgba(92,51,23,.2)}

/* ABOUT */
.about-strip{background:var(--coffee);color:var(--cream);padding:5rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:4.5rem;align-items:center}
.about-strip img{width:100%;border-radius:16px;height:400px;object-fit:cover}
.abt-eye{display:flex;align-items:center;gap:7px;color:var(--gold);font-family:var(--ff-l);font-size:.78rem;margin-bottom:.8rem}
.about-strip h2{font-family:var(--ff-d);font-style:italic;font-size:2.4rem;margin-bottom:1.3rem;color:var(--cream)}
.about-strip p{line-height:1.85;color:rgba(251,246,239,.75);font-size:.92rem;margin-bottom:.9rem}
.stats{display:flex;gap:2.5rem;margin-top:2rem}
.stat-n{font-family:var(--ff-d);font-size:1.9rem;color:var(--gold);display:block}
.stat-l{font-family:var(--ff-l);font-size:.75rem;color:rgba(251,246,239,.55)}

/* PREVIEW */
.preview-sec{padding:5rem 3rem;background:var(--cream)}
.sec-hdr{text-align:center;margin-bottom:2.5rem}
.sec-badge{display:inline-block;padding:5px 13px;border-radius:18px;font-family:var(--ff-l);font-size:.72rem;margin-bottom:.8rem;background:rgba(212,113,74,.12);color:var(--terra)}
.sec-hdr h2{font-family:var(--ff-d);font-style:italic;font-size:2.5rem;margin-bottom:.4rem;color:var(--coffee)}
.sec-hdr p{color:rgba(92,51,23,.58);font-size:.9rem}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.3rem;margin-bottom:2rem}
.center-btn{text-align:center}

/* CARDS */
.m-card{background:white;border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(92,51,23,.07);transition:transform .25s,box-shadow .25s}
.m-card:hover{transform:translateY(-7px) rotate(-.5deg);box-shadow:0 12px 30px rgba(92,51,23,.13)}
.m-card.clickable{cursor:pointer}
.m-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.m-icon{width:34px;height:34px;background:rgba(212,113,74,.1);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--terra);flex-shrink:0}
.m-name{font-family:var(--ff-d);font-size:.95rem;color:var(--coffee);margin-left:8px;flex:1}
.m-price{font-family:var(--ff-l);font-size:.88rem;color:var(--gold);font-weight:600}
.m-desc{font-size:.82rem;line-height:1.6;color:rgba(92,51,23,.6)}
.m-badge{display:inline-block;background:var(--terra);color:white;font-family:var(--ff-l);font-size:.67rem;padding:2px 8px;border-radius:10px;margin-bottom:.6rem}
.m-badge.gold{background:var(--gold);color:var(--coffee)}

/* EVENTS PREVIEW */
.events-preview{background:var(--leaf);padding:5rem 3rem}
.events-preview .sec-hdr h2{color:var(--cream)}
.events-preview .sec-hdr p{color:rgba(251,246,239,.65)}
.events-preview .sec-badge{background:rgba(251,246,239,.15);color:rgba(251,246,239,.85)}
.ev-preview-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;margin-bottom:2rem}
.ev-mini{background:var(--cream);border-radius:16px;padding:1.5rem;display:flex;gap:1rem;align-items:flex-start}
.ev-mini h3{font-family:var(--ff-d);font-size:1.05rem;color:var(--coffee);margin-bottom:.35rem}
.ev-mini p{font-size:.82rem;color:rgba(92,51,23,.62);line-height:1.55;margin-bottom:.6rem}
.ev-time{display:inline-flex;align-items:center;gap:4px;font-family:var(--ff-l);font-size:.72rem;color:var(--terra);background:rgba(212,113,74,.1);padding:3px 9px;border-radius:12px}
.ev-ico{width:46px;height:46px;background:var(--terra);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0}

/* PAGE HERO */
.page-hero{background:var(--coffee);color:var(--cream);padding:3.5rem 3rem;text-align:center}
.page-hero h1{font-family:var(--ff-d);font-style:italic;font-size:2.8rem;margin-bottom:.6rem}
.page-hero p{color:rgba(251,246,239,.7);font-size:.95rem}

/* CARDAPIO */
.cardapio-body{padding:3rem;background:var(--cream)}
.tabs{display:flex;gap:.7rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
.tab{padding:10px 22px;border-radius:10px;font-family:var(--ff-l);font-size:.83rem;border:1.5px solid rgba(92,51,23,.2);transition:background .2s,color .2s,border-color .2s}
.tab.active{background:var(--coffee);color:var(--cream);border-color:var(--coffee)}
.tab:not(.active){background:white;color:var(--coffee)}
.tab:not(.active):hover{background:rgba(92,51,23,.06)}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.3rem}

/* CAFE DETAIL */
.detail-body{padding:3rem;display:grid;grid-template-columns:1fr 1.1fr;gap:4rem;align-items:start;background:var(--cream)}
.detail-img-wrap{position:relative}
.detail-img-bg{position:absolute;inset:-12px;background:rgba(212,113,74,.13);border-radius:24px;transform:rotate(2deg)}
.detail-img{width:100%;border-radius:18px;height:420px;object-fit:cover;position:relative;box-shadow:0 16px 48px rgba(92,51,23,.18)}
.detail-badge{display:inline-block;background:var(--terra);color:white;font-family:var(--ff-l);font-size:.72rem;padding:3px 10px;border-radius:10px;margin-bottom:.8rem}
.detail-price{font-family:var(--ff-d);font-size:2rem;color:var(--gold);margin-bottom:1rem}
.detail-name{font-family:var(--ff-d);font-style:italic;font-size:2.2rem;color:var(--coffee);line-height:1.2;margin-bottom:.5rem}
.detail-desc{color:rgba(92,51,23,.7);line-height:1.8;margin-bottom:1.5rem;font-size:.95rem}
.detail-section{margin-bottom:1.5rem}
.detail-section h3{font-family:var(--ff-l);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--terra);margin-bottom:.7rem}
.tags{display:flex;flex-wrap:wrap;gap:.5rem}
.tag{background:rgba(92,51,23,.07);color:var(--coffee);padding:5px 12px;border-radius:10px;font-family:var(--ff-l);font-size:.78rem}
.sizes{display:flex;gap:.7rem}
.size-btn{padding:9px 18px;border-radius:9px;font-family:var(--ff-l);font-size:.82rem;border:1.5px solid rgba(92,51,23,.2);background:white;color:var(--coffee);transition:all .2s}
.size-btn.sel{background:var(--coffee);color:var(--cream);border-color:var(--coffee)}
.size-btn:hover:not(.sel){border-color:var(--terra);color:var(--terra)}
.stars{display:flex;align-items:center;gap:4px;margin-bottom:.8rem}
.star{color:var(--gold);font-size:1rem}
.star.empty{color:rgba(92,51,23,.2)}
.reviews{display:flex;flex-direction:column;gap:.9rem;margin-top:.7rem}
.review{background:white;border-radius:12px;padding:1rem;box-shadow:0 1px 8px rgba(92,51,23,.06)}
.review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.review-name{font-family:var(--ff-l);font-size:.82rem;font-weight:600;color:var(--coffee)}
.review-text{font-size:.82rem;color:rgba(92,51,23,.65);line-height:1.6}
.action-btns{display:flex;gap:.8rem;margin-top:1.5rem;flex-wrap:wrap}
.btn-terra{background:var(--terra);color:white;padding:11px 22px;border-radius:9px;font-family:var(--ff-l);font-size:.83rem;border:none;transition:background .2s}
.btn-terra:hover{background:#c0603e}
.btn-outline-sm{background:transparent;color:var(--coffee);padding:10px 20px;border-radius:9px;font-family:var(--ff-l);font-size:.83rem;border:1.5px solid rgba(92,51,23,.25);transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-outline-sm:hover{border-color:var(--terra);color:var(--terra)}
.btn-outline-sm.fav{color:var(--terra);border-color:var(--terra)}
.related-sec{padding:0 3rem 3.5rem;background:var(--cream)}
.related-sec h2{font-family:var(--ff-d);font-style:italic;font-size:1.8rem;margin-bottom:1.5rem;color:var(--coffee)}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}

/* EVENTS PAGE */
.ev-page-body{padding:3rem;background:var(--leaf)}
.ev-full-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.3rem}
.ev-card{background:var(--cream);border-radius:18px;padding:2rem;transition:box-shadow .2s}
.ev-card:hover{box-shadow:0 8px 26px rgba(0,0,0,.13)}
.ev-card-top{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1rem}
.ev-icon{width:50px;height:50px;background:var(--terra);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0}
.ev-card h3{font-family:var(--ff-d);font-size:1.1rem;color:var(--coffee);margin-bottom:.35rem;display:flex;align-items:center;gap:7px}
.ev-card>div>p,.ev-card .ev-card-top>div>p{font-size:.83rem;color:rgba(92,51,23,.65);line-height:1.6}
.ev-time-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--ff-l);font-size:.72rem;color:var(--terra);background:rgba(212,113,74,.1);padding:4px 10px;border-radius:12px;margin:.7rem 0;margin-right:auto}
.ev-btn{background:var(--coffee);color:var(--cream);padding:9px 17px;border-radius:8px;font-family:var(--ff-l);font-size:.78rem;border:none;display:inline-flex;align-items:center;gap:5px;transition:background .2s}
.ev-btn:hover{background:var(--terra)}
.ev-details-panel{margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid rgba(92,51,23,.1)}
.ev-details-panel h4{font-family:var(--ff-l);font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--terra);margin-bottom:.6rem}
.ev-item{display:flex;align-items:flex-start;gap:6px;font-size:.81rem;color:rgba(92,51,23,.72);margin-bottom:.38rem;line-height:1.5}
.ev-note{font-size:.78rem;color:rgba(92,51,23,.58);background:rgba(92,51,23,.05);padding:.65rem 1rem;border-radius:8px;margin-top:.7rem;line-height:1.6}
.ev-close-btn{background:transparent;color:var(--coffee);border:1.5px solid rgba(92,51,23,.2);padding:7px 15px;border-radius:8px;font-family:var(--ff-l);font-size:.75rem;margin-top:.8rem;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.ev-close-btn:hover{border-color:var(--terra);color:var(--terra)}

/* FOOTER */
footer{background:var(--coffee);color:var(--cream);padding:3.5rem 3rem 1.8rem}
.footer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3rem;margin-bottom:2.2rem}
.footer-logo{display:flex;align-items:center;gap:8px;font-family:var(--ff-d);font-style:italic;font-size:1.15rem;margin-bottom:.8rem}
.footer-tagline{font-size:.82rem;color:rgba(251,246,239,.5);line-height:1.75}
.footer-col h4{font-family:var(--ff-l);font-size:.68rem;letter-spacing:.09em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem}
.footer-col p{font-size:.82rem;color:rgba(251,246,239,.62);line-height:2}
.c-item{display:flex;align-items:flex-start;gap:7px;font-size:.82rem;color:rgba(251,246,239,.62);margin-bottom:.5rem;transition:color .2s}
.c-item:hover{color:var(--gold)}
.footer-copy{border-top:1px solid rgba(251,246,239,.08);padding-top:1.3rem;text-align:center;font-size:.72rem;color:rgba(251,246,239,.3);font-family:var(--ff-l)}

/* ICONS */
svg.ic{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;display:inline-block;vertical-align:middle}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{grid-template-columns:1fr;min-height:auto;padding:3rem 1.5rem}
  .hero-img-wrap{display:none}
  .about-strip{grid-template-columns:1fr;padding:3rem 1.5rem}
  .about-strip img{height:260px}
  .preview-grid,.menu-grid,.related-grid{grid-template-columns:repeat(2,1fr)}
  .ev-preview-grid,.ev-full-grid{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr;gap:2rem}
  .detail-body{grid-template-columns:1fr;padding:2rem 1.5rem}
  .detail-img{height:280px}
  .preview-sec,.cardapio-body,.ev-page-body,.related-sec{padding:3rem 1.5rem}
  nav{padding:0 1.5rem}
  .back-bar{padding:.9rem 1.5rem}
  footer{padding:2.5rem 1.5rem 1.5rem}
}
@media(max-width:600px){
  .preview-grid,.menu-grid,.related-grid{grid-template-columns:1fr}
  .nav-links{gap:1rem}
  .nav-links button{font-size:.78rem}
}

/* ── AUTH SCREEN ─────────────────────────────────────────────────────────── */
#auth-screen{
  position:fixed;inset:0;z-index:999;
  background:#2C1005;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#auth-screen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 25%, rgba(201,168,76,.1) 0%, transparent 55%),
    radial-gradient(ellipse 50% 55% at 85% 75%, rgba(212,113,74,.09) 0%, transparent 55%);
  pointer-events:none;
}
.auth-ghost{
  position:absolute;font-family:var(--ff-d);font-style:italic;
  font-size:clamp(100px,18vw,240px);font-weight:700;
  color:rgba(255,255,255,.022);white-space:nowrap;
  pointer-events:none;user-select:none;letter-spacing:-3px;
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.auth-card{
  position:relative;z-index:2;
  width:min(410px,93vw);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.18);
  border-radius:22px;
  padding:44px 38px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  animation:authIn .7s ease forwards;
}
@keyframes authIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes authOut{to{opacity:0;pointer-events:none}}
#auth-screen.leaving{animation:authOut .5s ease forwards}

.auth-logo{text-align:center;margin-bottom:30px}
.auth-logo .auth-ico{
  display:inline-flex;align-items:center;justify-content:center;
  width:58px;height:58px;
  background:rgba(201,168,76,.14);
  border:1px solid rgba(201,168,76,.32);
  border-radius:50%;margin-bottom:14px;font-size:26px;
}
.auth-logo h1{
  font-family:var(--ff-d);font-style:italic;font-size:24px;
  color:#EDE0CC;letter-spacing:.3px;line-height:1.2;
}
.auth-logo p{font-size:12px;color:rgba(237,224,204,.42);margin-top:5px;letter-spacing:2.5px;text-transform:uppercase}

.auth-divider{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.22),transparent);margin-bottom:28px}

/* tabs */
.auth-tabs{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;margin-bottom:26px;gap:3px}
.auth-tab{
  flex:1;padding:9px;border-radius:8px;
  font-family:var(--ff-l);font-size:.8rem;border:none;
  background:transparent;color:rgba(237,224,204,.45);
  cursor:pointer;transition:all .2s;
}
.auth-tab.active{background:rgba(201,168,76,.2);color:#EDE0CC;font-weight:500}

/* fields */
.auth-field{margin-bottom:16px}
.auth-field label{
  display:block;font-size:10.5px;letter-spacing:2px;
  text-transform:uppercase;color:rgba(237,224,204,.45);
  margin-bottom:7px;font-family:var(--ff-l);
}
.auth-field input{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(237,224,204,.11);
  border-radius:9px;padding:12px 15px;
  font-family:var(--ff-b);font-size:14px;
  color:#EDE0CC;outline:none;
  transition:border-color .2s,background .2s;
}
.auth-field input::placeholder{color:rgba(237,224,204,.22)}
.auth-field input:focus{border-color:rgba(201,168,76,.42);background:rgba(255,255,255,.09)}

.auth-row{display:flex;gap:10px}
.auth-row .auth-field{flex:1}

.auth-hint{
  background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.14);
  border-radius:8px;padding:9px 13px;margin-bottom:18px;
  font-size:11.5px;color:rgba(201,168,76,.58);line-height:1.6;
}
.auth-hint strong{color:#C9A84C;display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}

.auth-error{
  background:rgba(212,113,74,.13);border:1px solid rgba(212,113,74,.28);
  border-radius:8px;padding:9px 13px;font-size:12.5px;
  color:#F0A080;margin-bottom:14px;display:none;
  animation:shake .3s ease;
}
.auth-success{
  background:rgba(74,103,65,.2);border:1px solid rgba(74,103,65,.35);
  border-radius:8px;padding:9px 13px;font-size:12.5px;
  color:#8FBF82;margin-bottom:14px;display:none;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.btn-auth{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#C9A84C,#A0522D);
  color:#1A0A02;font-family:var(--ff-l);font-size:14px;
  font-weight:600;letter-spacing:.4px;
  border:none;border-radius:9px;cursor:pointer;
  transition:opacity .2s,transform .15s;margin-top:4px;
}
.btn-auth:hover{opacity:.9;transform:translateY(-1px)}
.btn-auth:active{transform:scale(.98)}

        <div class="auth-field">

</div>

  {id:'cappuccino',name:'Cappuccino Artesanal',cat:'quentes',price:'R$ 9,00',short:'Espresso duplo com leite vaporizado e espuma cremosa.',desc:'Espresso duplo com leite vaporizado e uma delicada camada de espuma cremosa. A proporção perfeita entre café, leite e espuma cria uma harmonia única.',notes:['Cremoso','Suave','Equilibrado'],img:'https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=600&q=80',history:'Nosso cappuccino segue a tradição italiana clássica: 1/3 espresso, 1/3 leite vaporizado e 1/3 espuma. Usamos leite integral orgânico de fazendas da Serra da Mantiqueira.',reviews:[{name:'Julia R.',stars:5,text:'A espuma é incrivelmente cremosa. Voltarei sempre!'},{name:'Pedro S.',stars:5,text:'Cappuccino perfeito para acompanhar o croissant.'}]},

      <p class="m-desc">${c.short}</p>
    </div>`).join('');
  const evMinis=EVENTS.map(ev=>`
    <div class="ev-mini">
      <div class="ev-ico">${I[ev.icon]}</div>

    <section class="hero">

      </div>
      <div class="hero-img-wrap">

        <img src="https://images.unsplash.com/photo-1564849744694-348ecd00c279?w=900&q=80" alt="Interior da Cafeteria" loading="lazy"/>
      </div>
    </section>
    <section class="about-strip">
      <img src="https://images.unsplash.com/photo-1474366521946-c3d4b507abf2?w=800&q=80" alt="Barista preparando café" loading="lazy"/>

        <div class="abt-eye">${I.book} Nossa História</div>

        <div class="sec-badge">☕ Nossos Grãos</div>
        <h2>Cardápio em Destaque</h2>
        <p>Cafés preparados com dedicação — clique para ver detalhes</p>

      <div class="preview-grid">${cards}</div>
      <div class="center-btn"><button class="btn-fill" onclick="nav('cardapio')">Ver Cardápio Completo</button></div>

    <section class="events-preview">
      <div class="sec-hdr">
        <div class="sec-badge">📚 Cultura & Café</div>
        <h2>Eventos Literários</h2>
        <p>Momentos especiais que celebram a literatura e a comunidade</p>
      </div>
      <div class="ev-preview-grid">${evMinis}</div>
      <div class="center-btn"><button class="btn-fill" style="background:var(--cream);color:var(--coffee)" onclick="nav('eventos')">Ver Todos os Eventos</button></div>
    </section>
    ${Footer()}
  </div>`;
}

function PageCardapio(){
  const tabs=[{id:'quentes',label:'Cafés Quentes'},{id:'gelados',label:'Cafés Gelados'},{id:'acompanhamentos',label:'Acompanhamentos'}];
  const items=CAFES.filter(c=>c.cat===S.menuTab);
  const tabsHtml=tabs.map(t=>`<button class="tab ${t.id===S.menuTab?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
  const cardsHtml=items.map(c=>`
    <div class="m-card clickable" onclick="nav('cafe','${c.id}')">
      ${c.badge?`<div class="m-badge">${c.badge}</div>`:''}
      <div class="m-top"><div style="display:flex;align-items:center;flex:1">${I.coffee}<span class="m-name" style="margin-left:8px">${c.name}</span></div><span class="m-price">${c.price}</span></div>
      <p class="m-desc">${c.desc.substring(0,90)}…</p>
    </div>`).join('');
  return `<div class="page">
    ${BackBar('Voltar para o Início',"nav('home')")}
    <div class="page-hero"><h1>Nosso Cardápio</h1><p>Cada bebida é preparada com dedicação e os melhores grãos selecionados</p></div>
    <div class="cardapio-body">
      <div class="tabs">${tabsHtml}</div>
      <div class="menu-grid">${cardsHtml}</div>
    </div>
    ${Footer()}
  </div>`;
}

function PageCafeDetail(){
  const c=CAFES.find(x=>x.id===S.cafeId);
  if(!c)return PageCardapio();
  const related=CAFES.filter(x=>x.cat===c.cat&&x.id!==c.id).slice(0,3);
  const relCards=related.map(r=>`
    <div class="m-card clickable" onclick="nav('cafe','${r.id}')">
      <div class="m-top"><div style="display:flex;align-items:center;flex:1">${I.coffee}<span class="m-name" style="margin-left:8px">${r.name}</span></div><span class="m-price">${r.price}</span></div>
      <p class="m-desc">${r.short}</p>
    </div>`).join('');
  return `<div class="page">
    ${BackBar('Voltar ao Cardápio',"nav('cardapio')")}
    <div class="detail-body">
      <div class="detail-img-wrap">
        <div class="detail-img-bg"></div>
        <img class="detail-img" src="${c.img}" alt="${c.name}" loading="lazy"/>
      </div>
      <div>
        ${c.badge?`<div class="detail-badge">${c.badge}</div>`:''}
        <h1 class="detail-name">${c.name}</h1>
        <div class="detail-price">${c.price}</div>
        <p class="detail-desc">${c.desc}</p>
        <div class="detail-section"><h3>Tamanho</h3>
          <div class="sizes">${['P','M','G'].map(s=>`<button class="size-btn ${S.selectedSize===s?'sel':''}" onclick="setSize('${s}')">${s}</button>`).join('')}</div>
        </div>
        <div class="detail-section"><h3>Notas de Sabor</h3>
          <div class="tags">${c.notes.map(n=>`<span class="tag">${n}</span>`).join('')}</div>
        </div>
        <div class="detail-section"><h3>História</h3>
          <p style="font-size:.88rem;line-height:1.75;color:rgba(92,51,23,.68)">${c.history}</p>
        </div>
        <div class="action-btns">
          <button class="btn-terra">Pedir Agora</button>
          <button class="btn-outline-sm ${S.favorited?'fav':''}" onclick="toggleFav()">${I.heart} ${S.favorited?'Favoritado':'Favoritar'}</button>
          <button class="btn-outline-sm">${I.share} Compartilhar</button>
        </div>
      </div>
    </div>
    <div class="related-sec">
      <div class="detail-section" style="margin-bottom:1.2rem"><h3>Avaliações</h3>
        <div class="stars">${starsHtml(5)}<span style="font-family:var(--ff-l);font-size:.8rem;color:rgba(92,51,23,.5);margin-left:6px">5.0 (${c.reviews.length} avaliações)</span></div>
      </div>
      <div class="reviews">${c.reviews.map(r=>`<div class="review">
        <div class="review-top"><span class="review-name">${r.name}</span><div class="stars" style="margin:0">${starsHtml(r.stars)}</div></div>
        <p class="review-text">"${r.text}"</p>
      </div>`).join('')}</div>
    </div>
    ${related.length?`<div class="related-sec"><h2>Você também pode gostar</h2><div class="related-grid">${relCards}</div></div>`:''}
    ${Footer()}
  </div>`;
}

function PageEventos(){
  const cards=EVENTS.map(ev=>{
    const isOpen=S.expandedEvent===ev.id;
    const det=isOpen?`<div class="ev-details-panel">
      <h4>${ev.details.next}</h4>
      ${ev.details.items.map(i=>`<div class="ev-item">${I.chk}<span>${i}</span></div>`).join('')}
      <div class="ev-note">${ev.details.note}</div>
      <button class="ev-close-btn" onclick="toggleEv(${ev.id})">${I.up} Fechar Detalhes</button>
    </div>`:'';
    return `<div class="ev-card">
      <div class="ev-card-top">
        <div class="ev-icon">${I[ev.icon]}</div>
        <div style="flex:1">
          <h3>${ev.title}${ev.badge?` <span class="m-badge gold">${ev.badge}</span>`:''}</h3>
          <p>${ev.desc}</p>
          <div class="ev-time-tag">${ev.time}</div>
        </div>
      </div>
      <button class="ev-btn" onclick="toggleEv(${ev.id})">${isOpen?I.up+' Fechar':I.dn+' Ver Detalhes'}</button>
      ${det}
    </div>`;
  }).join('');
  return `<div class="page">
    ${BackBar('Voltar para o Início',"nav('home')")}
    <div class="page-hero"><h1>Eventos Literários</h1><p>Momentos especiais que celebram a literatura e a comunidade</p></div>
    <div class="ev-page-body"><div class="ev-full-grid">${cards}</div></div>
    ${Footer()}
  </div>`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  let body='';
  if(S.page==='home')body=PageHome();
  else if(S.page==='cardapio')body=PageCardapio();
  else if(S.page==='cafe')body=PageCafeDetail();
  else if(S.page==='eventos')body=PageEventos();
  document.getElementById('root').innerHTML=Nav()+body;
  window.scrollTo(0,0);
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
window.nav=(page,id)=>set({page,cafeId:id||null,favorited:false,selectedSize:'P'});
window.navContact=()=>{set({page:'home'});setTimeout(()=>{const el=document.getElementById('contato');if(el)el.scrollIntoView({behavior:'smooth'});},100);};
window.setTab=(tab)=>set({menuTab:tab});
window.toggleEv=(id)=>set({expandedEvent:S.expandedEvent===id?null:id});
window.setSize=(s)=>set({selectedSize:s});
window.toggleFav=()=>set({favorited:!S.favorited});

// ── AUTH ───────────────────────────────────────────────────────────────────
const DEMO={email:'cafe@graoepoesia.com',pass:'leitura123'};
let USERS=JSON.parse(localStorage.getItem('gp_users')||'[]');

window.authTab=function(t){
  document.getElementById('painel-login').style.display=t==='login'?'':'none';
  document.getElementById('painel-cadastro').style.display=t==='cadastro'?'':'none';
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-cadastro').classList.toggle('active',t==='cadastro');
  document.getElementById('login-error').style.display='none';
  document.getElementById('cad-error').style.display='none';
  document.getElementById('cad-ok').style.display='none';
};

function openSite(){
  const el=document.getElementById('auth-screen');
  el.classList.add('leaving');
  setTimeout(()=>el.style.display='none',480);
}

window.submitLogin=function(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-senha').value;
  const err=document.getElementById('login-error');
  const isDemo=email===DEMO.email&&pass===DEMO.pass;
  const isUser=USERS.find(u=>u.email===email&&u.pass===pass);
  if(isDemo||isUser){
    err.style.display='none';
    sessionStorage.setItem('gp_logged','1');
    openSite();
  } else {
    err.style.display='block';
    document.getElementById('login-senha').value='';
  }
};

window.submitCadastro=function(){
  const nome=document.getElementById('cad-nome').value.trim();
  const sobre=document.getElementById('cad-sobrenome').value.trim();
  const email=document.getElementById('cad-email').value.trim().toLowerCase();
  const senha=document.getElementById('cad-senha').value;
  const confirma=document.getElementById('cad-confirma').value;
  const err=document.getElementById('cad-error');
  const ok=document.getElementById('cad-ok');
  err.style.display='none';ok.style.display='none';
  if(!nome||!sobre||!email||!senha||!confirma){err.textContent='Preencha todos os campos.';err.style.display='block';return;}
  if(senha.length<6){err.textContent='A senha deve ter no mínimo 6 caracteres.';err.style.display='block';return;}
  if(senha!==confirma){err.textContent='As senhas não coincidem.';err.style.display='block';return;}
  if(USERS.find(u=>u.email===email)){err.textContent='Este e-mail já está cadastrado.';err.style.display='block';return;}
  USERS.push({nome,sobre,email,pass:senha});
  localStorage.setItem('gp_users',JSON.stringify(USERS));
  ok.style.display='block';
  sessionStorage.setItem('gp_logged','1');
  setTimeout(openSite,1200);
};

if(sessionStorage.getItem('gp_logged')){
  document.getElementById('auth-screen').style.display='none';
}

render();
</script>
</body>
</html>
